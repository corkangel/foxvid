<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Foxy Codon Live Visuals</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas#gl { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
canvas#overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
#ui {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 10; display: flex; gap: 12px; opacity: 0.8; transition: opacity 0.3s;
}
#ui:hover { opacity: 1; }
#ui button {
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
  color: #fff; padding: 8px 16px; border-radius: 20px; cursor: pointer;
  font: 14px sans-serif; backdrop-filter: blur(8px);
}
#ui button:hover { background: rgba(255,255,255,0.3); }
#ui button.active { background: rgba(0,180,255,0.5); border-color: #0cf; }
#status {
  position: fixed; top: 10px; right: 10px; color: rgba(255,255,255,0.5);
  font: 12px monospace; z-index: 10;
}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<canvas id="overlay"></canvas>
<div id="ui">
  <button id="btnMic">Enable Mic</button>
  <button id="btnFullscreen">Fullscreen</button>
  <button id="btnParticles" class="active">Particles</button>
  <button id="btnNext">Next Effect</button>
</div>
<div id="status"></div>

<script>
// ============================================================
// WEBGL SETUP
// ============================================================
const glCanvas = document.getElementById('gl');
const gl = glCanvas.getContext('webgl2', { antialias: false, preserveDrawingBuffer: false });
const ovCanvas = document.getElementById('overlay');
const ovCtx = ovCanvas.getContext('2d');

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const w = window.innerWidth, h = window.innerHeight;
  glCanvas.width = w * dpr; glCanvas.height = h * dpr;
  ovCanvas.width = w * dpr; ovCanvas.height = h * dpr;
  gl.viewport(0, 0, glCanvas.width, glCanvas.height);
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// SHADER COMPILATION
// ============================================================
function compileShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

function createProgram(vSrc, fSrc) {
  const p = gl.createProgram();
  gl.attachShader(p, compileShader(vSrc, gl.VERTEX_SHADER));
  gl.attachShader(p, compileShader(fSrc, gl.FRAGMENT_SHADER));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(p));
    return null;
  }
  return p;
}

const vertSrc = `#version 300 es
in vec2 pos;
out vec2 uv;
void main() {
  uv = pos * 0.5 + 0.5;
  gl_Position = vec4(pos, 0.0, 1.0);
}`;

// ============================================================
// FRAGMENT SHADERS — each is a different visual effect
// ============================================================
const shaders = [];

// Effect 0: Neon Tunnel Rays
shaders.push(`#version 300 es
precision highp float;
in vec2 uv;
out vec4 fragColor;
uniform float time;
uniform float bass;
uniform float mid;
uniform float high;
uniform vec2 resolution;

void main() {
  vec2 p = (uv - 0.5) * vec2(resolution.x / resolution.y, 1.0);
  float angle = atan(p.y, p.x);
  float dist = length(p);

  float pulse = 1.0 + bass * 0.4;
  float rays = sin(angle * 8.0 + time * 0.7) * 0.5 + 0.5;
  rays *= sin(angle * 13.0 - time * 1.1) * 0.5 + 0.5;
  float tunnel = sin(1.0 / (dist + 0.01) * 0.3 - time * 2.0 * pulse) * 0.5 + 0.5;

  float glow = rays * tunnel * smoothstep(1.2, 0.0, dist);

  float hue = angle / 6.2832 + time * 0.05 + mid * 0.3;
  vec3 col1 = vec3(0.0, 0.8, 1.0);  // cyan
  vec3 col2 = vec3(0.0, 0.4, 1.0);  // blue
  vec3 col3 = vec3(0.0, 1.0, 0.6);  // teal/green

  float t = fract(hue);
  vec3 col;
  if (t < 0.33) col = mix(col1, col2, t * 3.0);
  else if (t < 0.66) col = mix(col2, col3, (t - 0.33) * 3.0);
  else col = mix(col3, col1, (t - 0.66) * 3.0);

  col *= glow * (1.5 + high * 1.0);
  col += vec3(0.2, 0.9, 0.8) * pow(glow, 3.0) * 0.5;

  fragColor = vec4(col, 1.0);
}
`);

// Effect 1: Plasma Swirl
shaders.push(`#version 300 es
precision highp float;
in vec2 uv;
out vec4 fragColor;
uniform float time;
uniform float bass;
uniform float mid;
uniform float high;
uniform vec2 resolution;

void main() {
  vec2 p = (uv - 0.5) * vec2(resolution.x / resolution.y, 1.0) * 3.0;
  float pulse = 1.0 + bass * 0.5;

  float v = 0.0;
  v += sin(p.x * 1.5 + time * pulse);
  v += sin((p.y * 1.5 + time * 0.7) * 1.2);
  v += sin((p.x * 1.5 + p.y * 1.5 + time * 0.5) * 0.8);

  float cx = p.x + 0.5 * sin(time * 0.3);
  float cy = p.y + 0.5 * cos(time * 0.4);
  v += sin(sqrt(cx * cx + cy * cy + 1.0) * 2.0 - time * 1.5);

  v *= 0.5;
  float shift = mid * 0.5;

  vec3 col;
  col.r = sin(v * 3.14159 + shift) * 0.5 + 0.5;
  col.g = sin(v * 3.14159 + 2.094 + shift) * 0.5 + 0.5;
  col.b = sin(v * 3.14159 + 4.188 + shift) * 0.5 + 0.5;

  // push toward blue/cyan/teal palette
  col = mix(col, vec3(col.r * 0.2, col.g * 0.9, col.b * 1.3), 0.5);
  col *= 1.2 + high * 0.5;

  fragColor = vec4(col, 1.0);
}
`);

// Effect 2: Kaleidoscope
shaders.push(`#version 300 es
precision highp float;
in vec2 uv;
out vec4 fragColor;
uniform float time;
uniform float bass;
uniform float mid;
uniform float high;
uniform vec2 resolution;

#define PI 3.14159265

void main() {
  vec2 p = (uv - 0.5) * vec2(resolution.x / resolution.y, 1.0);
  float angle = atan(p.y, p.x);
  float dist = length(p);

  float segments = 6.0 + floor(mid * 4.0);
  angle = mod(angle, 2.0 * PI / segments);
  angle = abs(angle - PI / segments);

  vec2 kp = vec2(cos(angle), sin(angle)) * dist;

  float pulse = 1.0 + bass * 0.6;
  float pattern = 0.0;
  pattern += sin(kp.x * 10.0 + time * pulse) * 0.5;
  pattern += sin(kp.y * 8.0 - time * 0.8) * 0.5;
  pattern += sin((kp.x + kp.y) * 6.0 + time * 0.6) * 0.5;
  pattern += sin(dist * 12.0 - time * 2.5) * 0.3;

  vec3 col;
  col.r = sin(pattern * 2.0 + time * 0.3) * 0.5 + 0.5;
  col.g = sin(pattern * 2.0 + time * 0.3 + 1.0) * 0.5 + 0.5;
  col.b = sin(pattern * 2.0 + time * 0.3 + 2.0) * 0.5 + 0.5;

  // neon blue/cyan/teal tint
  col = col * vec3(0.3, 1.0, 1.3);
  col += vec3(0.0, 0.1, 0.2);
  col *= 1.0 + high * 0.4;

  float vignette = 1.0 - dist * 0.6;
  col *= max(vignette, 0.2);

  fragColor = vec4(col, 1.0);
}
`);

// Effect 3: Waveform Rings
shaders.push(`#version 300 es
precision highp float;
in vec2 uv;
out vec4 fragColor;
uniform float time;
uniform float bass;
uniform float mid;
uniform float high;
uniform vec2 resolution;

void main() {
  vec2 p = (uv - 0.5) * vec2(resolution.x / resolution.y, 1.0);
  float dist = length(p);
  float angle = atan(p.y, p.x);

  float pulse = 1.0 + bass * 0.5;

  float rings = 0.0;
  for (float i = 0.0; i < 5.0; i++) {
    float r = 0.15 + i * 0.12;
    float wave = sin(angle * (3.0 + i * 2.0) + time * (1.0 + i * 0.3) * pulse) * 0.03 * (1.0 + mid);
    float ring = smoothstep(0.02, 0.0, abs(dist - r - wave));
    float hue = fract(i * 0.2 + time * 0.1);
    vec3 rcol;
    if (hue < 0.33) rcol = mix(vec3(0.0, 0.8, 1.0), vec3(0.0, 0.4, 1.0), hue * 3.0);
    else if (hue < 0.66) rcol = mix(vec3(0.0, 0.4, 1.0), vec3(0.0, 1.0, 0.5), (hue - 0.33) * 3.0);
    else rcol = mix(vec3(0.0, 1.0, 0.5), vec3(0.0, 0.8, 1.0), (hue - 0.66) * 3.0);
    rings += ring;
    fragColor.rgb += rcol * ring * (1.5 + high);
  }

  // center glow
  float cg = exp(-dist * 4.0) * (0.3 + bass * 0.5);
  fragColor.rgb += vec3(0.1, 0.6, 0.8) * cg;

  // background
  fragColor.rgb += vec3(0.0, 0.05, 0.1) * (1.0 - dist);
  fragColor.a = 1.0;
}
`);

// Effect 4: Fractal Noise Flow
shaders.push(`#version 300 es
precision highp float;
in vec2 uv;
out vec4 fragColor;
uniform float time;
uniform float bass;
uniform float mid;
uniform float high;
uniform vec2 resolution;

vec3 hash3(vec3 p) {
  p = vec3(dot(p, vec3(127.1, 311.7, 74.7)),
           dot(p, vec3(269.5, 183.3, 246.1)),
           dot(p, vec3(113.5, 271.9, 124.6)));
  return fract(sin(p) * 43758.5453);
}

float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  float a = dot(hash3(vec3(i, 0.0)).xy, vec2(1.0));
  float b = dot(hash3(vec3(i + vec2(1.0, 0.0), 0.0)).xy, vec2(1.0));
  float c = dot(hash3(vec3(i + vec2(0.0, 1.0), 0.0)).xy, vec2(1.0));
  float d = dot(hash3(vec3(i + vec2(1.0, 1.0), 0.0)).xy, vec2(1.0));
  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}

float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  mat2 rot = mat2(0.8, 0.6, -0.6, 0.8);
  for (int i = 0; i < 5; i++) {
    v += a * noise(p);
    p = rot * p * 2.0;
    a *= 0.5;
  }
  return v;
}

void main() {
  vec2 p = (uv - 0.5) * vec2(resolution.x / resolution.y, 1.0) * 3.0;
  float pulse = 1.0 + bass * 0.3;

  float t = time * 0.2 * pulse;
  float n1 = fbm(p + vec2(t, t * 0.7));
  float n2 = fbm(p + vec2(n1 * 2.0 + t * 0.3, n1 * 1.5 - t * 0.2));
  float n3 = fbm(p + vec2(n2 * 1.5 - t * 0.1, n2 * 2.0 + t * 0.4));

  vec3 col = vec3(0.0);
  col = mix(vec3(0.0, 0.05, 0.15), vec3(0.0, 0.7, 0.9), n2 * n2);
  col = mix(col, vec3(0.0, 0.3, 1.0), n3 * 0.8);
  col += vec3(0.1, 0.9, 0.7) * pow(n1, 3.0) * (1.0 + high);

  col *= 1.2 + mid * 0.3;
  fragColor = vec4(col, 1.0);
}
`);

// Effect 5: Hypnotic Spiral
shaders.push(`#version 300 es
precision highp float;
in vec2 uv;
out vec4 fragColor;
uniform float time;
uniform float bass;
uniform float mid;
uniform float high;
uniform vec2 resolution;

#define PI 3.14159265

void main() {
  vec2 p = (uv - 0.5) * vec2(resolution.x / resolution.y, 1.0);
  float dist = length(p);
  float angle = atan(p.y, p.x);

  float pulse = 1.0 + bass * 0.5;
  float spiral = sin(angle * 3.0 + dist * 15.0 - time * 3.0 * pulse) * 0.5 + 0.5;
  float spiral2 = sin(angle * 5.0 - dist * 10.0 + time * 2.0) * 0.5 + 0.5;

  float pattern = spiral * spiral2;
  pattern *= smoothstep(1.5, 0.0, dist);

  float hue = fract(dist * 2.0 - time * 0.15 + mid * 0.2);
  vec3 col;
  if (hue < 0.25) col = mix(vec3(0.0, 0.8, 1.0), vec3(0.0, 0.3, 1.0), hue * 4.0);
  else if (hue < 0.5) col = mix(vec3(0.0, 0.3, 1.0), vec3(0.0, 1.0, 0.6), (hue - 0.25) * 4.0);
  else if (hue < 0.75) col = mix(vec3(0.0, 1.0, 0.6), vec3(0.0, 0.6, 0.8), (hue - 0.5) * 4.0);
  else col = mix(vec3(0.0, 0.6, 0.8), vec3(0.0, 0.8, 1.0), (hue - 0.75) * 4.0);

  col *= pattern * (1.5 + high * 0.5);
  col += vec3(0.0, 0.03, 0.08);

  fragColor = vec4(col, 1.0);
}
`);

// ============================================================
// COMPILE ALL PROGRAMS
// ============================================================
const programs = shaders.map(fSrc => createProgram(vertSrc, fSrc));
let currentEffect = 0;
let nextEffect = 1;
const EFFECT_DURATION = 15; // seconds per effect before auto-cycling
const CROSSFADE_DURATION = 2.0; // seconds to crossfade
let effectStartTime = 0;
let crossfading = false;
let crossfadeStart = 0;

// Fullscreen quad
const quad = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quad);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

// Framebuffers for crossfade
function createFBO() {
  const fbo = gl.createFramebuffer();
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, glCanvas.width, glCanvas.height, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return { fbo, tex };
}

let fboA = createFBO();
let fboB = createFBO();

// Resize FBOs when window resizes
const origResize = resize;
resize = function() {
  origResize();
  [fboA, fboB].forEach(f => {
    gl.bindTexture(gl.TEXTURE_2D, f.tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, glCanvas.width, glCanvas.height, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  });
};

// Mix shader for crossfade
const mixFragSrc = `#version 300 es
precision highp float;
in vec2 uv;
out vec4 fragColor;
uniform sampler2D texA;
uniform sampler2D texB;
uniform float mixAmt;
void main() {
  fragColor = mix(texture(texA, uv), texture(texB, uv), mixAmt);
}`;
const mixProg = createProgram(vertSrc, mixFragSrc);

// ============================================================
// LOGO
// ============================================================
const logoImg = new Image();
logoImg.src = 'logo.png';
let logoReady = false;
logoImg.onload = () => { logoReady = true; };

// Logo movement states
const LOGO_STATES = ['breathe', 'spin', 'wobble', 'pulse'];
let logoState = 0;
let logoStateStart = 0;
const LOGO_STATE_DURATION = 12; // seconds per state

// Particle system
const particles = [];
const MAX_PARTICLES = 300;
let particlesEnabled = true;

function spawnParticle(cw, ch) {
  const angle = Math.random() * Math.PI * 2;
  const speed = 60 + Math.random() * 180;
  const size = 2 + Math.random() * 5;
  // Spawn from center area (behind logo)
  const spread = Math.min(cw, ch) * 0.15;
  particles.push({
    x: cw / 2 + (Math.random() - 0.5) * spread,
    y: ch / 2 + (Math.random() - 0.5) * spread,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    life: 1.0,
    decay: 0.15 + Math.random() * 0.25,
    size,
    hue: Math.random(), // 0-1 mapped to cyan/blue/teal
  });
}

function updateAndDrawParticles(ctx, cw, ch, dt) {
  // Spawn a few particles per frame
  const spawnRate = 8 + Math.floor(audioSmooth.bass * 20);
  for (let i = 0; i < spawnRate && particles.length < MAX_PARTICLES; i++) {
    spawnParticle(cw, ch);
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= p.decay * dt;

    if (p.life <= 0) {
      particles.splice(i, 1);
      continue;
    }

    // Color from hue — orange/amber/gold range
    let r, g, b;
    if (p.hue < 0.33) {
      r = 255; g = Math.floor(100 + p.hue * 200); b = 0;
    } else if (p.hue < 0.66) {
      r = 255; g = Math.floor(160 + (p.hue - 0.33) * 200); b = Math.floor((p.hue - 0.33) * 90);
    } else {
      r = 255; g = Math.floor(200 + (p.hue - 0.66) * 165); b = Math.floor(30 + (p.hue - 0.66) * 60);
    }

    const alpha = p.life * 0.8;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.shadowColor = `rgba(${r},${g},${b},${alpha})`;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1.0;
}

let lastFrameTime = performance.now() / 1000;

function drawLogo() {
  if (!logoReady) return;
  const ctx = ovCtx;
  const cw = ovCanvas.width, ch = ovCanvas.height;

  ctx.clearRect(0, 0, cw, ch);

  const nowMs = performance.now() / 1000;
  const dt = Math.min(nowMs - lastFrameTime, 0.05);
  lastFrameTime = nowMs;

  // Draw particles behind logo
  if (particlesEnabled) updateAndDrawParticles(ctx, cw, ch, dt);

  const now = performance.now() / 1000;

  // Auto-cycle logo movement states
  if (now - logoStateStart > LOGO_STATE_DURATION) {
    logoState = (logoState + 1) % LOGO_STATES.length;
    logoStateStart = now;
  }

  const stateTime = now - logoStateStart;
  const state = LOGO_STATES[logoState];

  const fadeIn = Math.min(stateTime / 1.5, 1.0);
  const fadeOut = Math.min((LOGO_STATE_DURATION - stateTime) / 1.5, 1.0);
  const blend = Math.min(fadeIn, fadeOut);

  let scaleAmt = 1.0;
  let rotation = 0;

  if (state === 'breathe') {
    scaleAmt = 1.0 + 0.08 * Math.sin(now * 0.5) * blend;
  } else if (state === 'spin') {
    rotation = Math.sin(stateTime * 0.4) * Math.PI * 0.5 * blend;
    scaleAmt = 1.0 + 0.03 * Math.sin(now * 0.8);
  } else if (state === 'wobble') {
    rotation = Math.sin(now * 1.5) * 0.15 * blend;
    scaleAmt = 1.0 + 0.05 * Math.sin(now * 0.7) * blend;
  } else if (state === 'pulse') {
    const beat = Math.pow(Math.sin(now * 2.0) * 0.5 + 0.5, 3.0);
    scaleAmt = 1.0 + 0.12 * beat * blend;
  }

  const baseScale = Math.min(cw, ch) * 0.9 * scaleAmt;
  const aspect = logoImg.width / logoImg.height;
  let lw, lh;
  if (aspect > 1) { lw = baseScale; lh = baseScale / aspect; }
  else { lh = baseScale; lw = baseScale * aspect; }

  ctx.save();
  ctx.translate(cw / 2, ch / 2);
  ctx.rotate(rotation);

  ctx.shadowColor = 'rgba(0, 0, 0, 0.6)';
  ctx.shadowBlur = 20;
  ctx.shadowOffsetX = 4;
  ctx.shadowOffsetY = 4;
  ctx.drawImage(logoImg, -lw / 2, -lh / 2, lw, lh);
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;

  ctx.restore();
}

// ============================================================
// AUDIO
// ============================================================
let audioCtx = null;
let analyser = null;
let audioData = null;
let micActive = false;

const audio = { bass: 0, mid: 0, high: 0 };
const audioSmooth = { bass: 0, mid: 0, high: 0 };

async function initMic() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new AudioContext();
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.8;
    source.connect(analyser);
    audioData = new Uint8Array(analyser.frequencyBinCount);
    micActive = true;
    document.getElementById('btnMic').classList.add('active');
    document.getElementById('btnMic').textContent = 'Mic On';
  } catch (e) {
    console.error('Mic access denied:', e);
    document.getElementById('status').textContent = 'Mic denied';
  }
}

function updateAudio() {
  if (!micActive || !analyser) return;
  analyser.getByteFrequencyData(audioData);
  const n = audioData.length;

  // Split into 3 bands
  let bassSum = 0, midSum = 0, highSum = 0;
  const bassEnd = Math.floor(n * 0.15);
  const midEnd = Math.floor(n * 0.5);

  for (let i = 0; i < bassEnd; i++) bassSum += audioData[i];
  for (let i = bassEnd; i < midEnd; i++) midSum += audioData[i];
  for (let i = midEnd; i < n; i++) highSum += audioData[i];

  audio.bass = bassSum / (bassEnd * 255);
  audio.mid = midSum / ((midEnd - bassEnd) * 255);
  audio.high = highSum / ((n - midEnd) * 255);

  // Smooth with different attack/release
  const attack = 0.3, release = 0.05;
  for (const key of ['bass', 'mid', 'high']) {
    const rate = audio[key] > audioSmooth[key] ? attack : release;
    audioSmooth[key] += (audio[key] - audioSmooth[key]) * rate;
  }
}

// ============================================================
// CONTROLS
// ============================================================
document.getElementById('btnMic').addEventListener('click', initMic);
document.getElementById('btnFullscreen').addEventListener('click', () => {
  document.documentElement.requestFullscreen?.() ||
  document.documentElement.webkitRequestFullscreen?.();
});
document.getElementById('btnParticles').addEventListener('click', () => {
  particlesEnabled = !particlesEnabled;
  const btn = document.getElementById('btnParticles');
  btn.classList.toggle('active', particlesEnabled);
  if (!particlesEnabled) particles.length = 0;
});
document.getElementById('btnNext').addEventListener('click', () => {
  if (!crossfading) {
    nextEffect = (currentEffect + 1) % programs.length;
    crossfading = true;
    crossfadeStart = performance.now() / 1000;
  }
});

// Hide UI after inactivity
let uiTimeout;
function showUI() {
  document.getElementById('ui').style.display = 'flex';
  clearTimeout(uiTimeout);
  uiTimeout = setTimeout(() => {
    document.getElementById('ui').style.display = 'none';
  }, 5000);
}
document.addEventListener('mousemove', showUI);
document.addEventListener('touchstart', showUI);
showUI();

// ============================================================
// RENDER LOOP
// ============================================================
let startTime = performance.now() / 1000;
effectStartTime = startTime;

function render() {
  requestAnimationFrame(render);

  const now = performance.now() / 1000;
  const time = now - startTime;

  // Auto-cycle effects
  if (!crossfading && now - effectStartTime > EFFECT_DURATION) {
    nextEffect = (currentEffect + 1) % programs.length;
    crossfading = true;
    crossfadeStart = now;
  }

  // Finish crossfade
  if (crossfading && now - crossfadeStart > CROSSFADE_DURATION) {
    currentEffect = nextEffect;
    effectStartTime = now;
    crossfading = false;
  }

  updateAudio();

  function renderEffect(prog, target) {
    gl.bindFramebuffer(gl.FRAMEBUFFER, target);
    gl.viewport(0, 0, glCanvas.width, glCanvas.height);
    gl.useProgram(prog);
    gl.uniform1f(gl.getUniformLocation(prog, 'time'), time);
    gl.uniform2f(gl.getUniformLocation(prog, 'resolution'), glCanvas.width, glCanvas.height);
    gl.uniform1f(gl.getUniformLocation(prog, 'bass'), audioSmooth.bass);
    gl.uniform1f(gl.getUniformLocation(prog, 'mid'), audioSmooth.mid);
    gl.uniform1f(gl.getUniformLocation(prog, 'high'), audioSmooth.high);
    const posLoc = gl.getAttribLocation(prog, 'pos');
    gl.bindBuffer(gl.ARRAY_BUFFER, quad);
    gl.enableVertexAttribArray(posLoc);
    gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }

  if (crossfading) {
    // Render both effects to FBOs, then mix
    renderEffect(programs[currentEffect], fboA.fbo);
    renderEffect(programs[nextEffect], fboB.fbo);

    const mixAmt = Math.min((now - crossfadeStart) / CROSSFADE_DURATION, 1.0);

    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.viewport(0, 0, glCanvas.width, glCanvas.height);
    gl.useProgram(mixProg);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, fboA.tex);
    gl.uniform1i(gl.getUniformLocation(mixProg, 'texA'), 0);
    gl.activeTexture(gl.TEXTURE1);
    gl.bindTexture(gl.TEXTURE_2D, fboB.tex);
    gl.uniform1i(gl.getUniformLocation(mixProg, 'texB'), 1);
    gl.uniform1f(gl.getUniformLocation(mixProg, 'mixAmt'), mixAmt);
    const posLoc = gl.getAttribLocation(mixProg, 'pos');
    gl.bindBuffer(gl.ARRAY_BUFFER, quad);
    gl.enableVertexAttribArray(posLoc);
    gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  } else {
    // Single effect direct to screen
    renderEffect(programs[currentEffect], null);
  }

  // Logo overlay
  drawLogo();
}

render();
</script>
